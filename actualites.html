  <style>
    /* ── Fil de timeline ── */
    .tl-wrap { position: relative; max-width: 56rem; margin: 0 auto; }
    .tl-line {
      position: absolute; top: 0; bottom: 0; width: 1px;
      background: linear-gradient(to bottom, transparent, #1e3a8a 5%, #1e3a8a 95%, transparent);
      left: 1rem;
    }
    @media (min-width: 768px) { .tl-line { left: 50%; transform: translateX(-50%); } }

    /* ── Rangée ── */
    .tl-row {
      position: relative;
      display: flex;
      align-items: center;
      padding: 0 0 2.5rem 3rem; /* gauche : espace dot mobile */
    }
    @media (min-width: 768px) {
      .tl-row { padding: 0 0 2.5rem 0; }
      .tl-row.left  .tl-card { margin-right: calc(50% + 1.5rem); }
      .tl-row.right .tl-card { margin-left:  calc(50% + 1.5rem); }
    }

    /* ── Dot ── */
    .tl-dot {
      position: absolute; left: 1rem; top: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px; border-radius: 50%;
      background: #f59e0b; border: 2px solid white;
      box-shadow: 0 0 0 3px rgba(245,158,11,.2); z-index: 2;
    }
    @media (min-width: 768px) { .tl-dot { left: 50%; } }

    /* ── Card ── */
    .tl-card {
      width: 100%;
      background: white; border-radius: 1rem; border: 1px solid #f1f5f9;
      padding: 1.5rem; box-shadow: 0 1px 6px rgba(2,6,23,.06);
      transition: transform .25s, box-shadow .25s;
    }
    .tl-card:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(2,6,23,.1); }
    .tl-card .body { text-align: justify; font-size: .875rem; line-height: 1.65; color: #64748b; }

    /* ── Banner ── */
    .card-banner {
      width: calc(100% + 3rem); margin: -1.5rem -1.5rem 1rem;
      height: 180px; overflow: hidden;
      border-radius: 1rem 1rem 0 0; border-bottom: 1px solid #e2e8f0;
    }
    .card-banner img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* ── Press preview ── */
    .pp {
      display: flex; border: 1px solid #e2e8f0; border-radius: .75rem;
      overflow: hidden; text-decoration: none; background: #f8fafc;
      margin-top: .75rem; transition: box-shadow .2s, transform .2s;
    }
    .pp:hover { box-shadow: 0 6px 20px rgba(30,58,138,.12); transform: translateY(-1px); }
    .pp-thumb {
      width: 64px; min-width: 64px; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 3px; padding: 8px 6px;
    }
    .pp-thumb .si {
      width: 28px; height: 28px; border-radius: 5px; background: rgba(255,255,255,.15);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Barlow Condensed',sans-serif; font-weight: 900;
      font-size: .85rem; color: white; letter-spacing: .05em;
    }
    .pp-thumb .sl {
      font-family: 'Barlow Condensed',sans-serif; font-weight: 800; font-size: .52rem;
      text-transform: uppercase; color: rgba(255,255,255,.7); text-align: center; line-height: 1.1;
    }
    .pp-body { flex: 1; padding: 8px 10px; display: flex; flex-direction: column; justify-content: center; gap: 3px; min-width: 0; }
    .pp-body span { font-size: .68rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pp-body p {
      font-family: 'Barlow Condensed',sans-serif; font-weight: 800; font-size: .78rem;
      text-transform: uppercase; color: #1e293b; line-height: 1.25; margin: 0;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .pp-arrow { display: flex; align-items: center; padding: 0 10px; color: #cbd5e1; flex-shrink: 0; transition: color .2s; }
    .pp:hover .pp-arrow { color: #f59e0b; }

    /* ── Année ── */
    .year-marker {
      position: relative; display: flex; align-items: center; justify-content: center; margin: 1.5rem 0;
    }
    .year-marker::before { content:''; position: absolute; inset: 0; border-top: 1px solid #e2e8f0; top: 50%; }
    .year-marker span {
      position: relative; background: #f9fafb; padding: 0 1rem;
      font-family: 'Barlow Condensed',sans-serif; font-weight: 800;
      font-size: .72rem; text-transform: uppercase; letter-spacing: .15em; color: #94a3b8;
    }

    /* ── Filtres ── */
    .filter-btn.active { background: #1e3a8a; color: white; border-color: #1e3a8a; border-radius: .75rem; }
  </style>
</head>
<body class="font-sans bg-gray-50 min-h-screen flex flex-col">
  <div id="page-loader" aria-hidden="true">
    <div class="loader-monogram">QR</div><div class="loader-name">Quentin Rapaud</div>
    <div class="loader-subtitle">Avocat au Barreau de Paris</div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  </div>
  <custom-header class="block"></custom-header>

  <main class="flex-1">
    <!-- Hero -->
    <section class="bg-white border-b border-slate-100 py-14">
      <div class="container mx-auto px-4">
        <p class="text-xs uppercase tracking-widest text-slate-400 mb-3" style="font-family:'Barlow Condensed',sans-serif;font-weight:800;">Cabinet Quentin Rapaud</p>
        <h1 class="text-4xl md:text-5xl font-bold text-slate-900 mb-4">Actualités</h1>
        <p class="text-slate-500 max-w-xl leading-relaxed">Maître Quentin Rapaud intervient sur de nombreux dossiers médiatiques, complexes et sensibles devant les tribunaux correctionnels et les cours d'assises dans toute la France.</p>
        <div class="flex flex-wrap gap-2 mt-8">
          <button type="button" onclick="tlFilter('all',event)"      class="filter-btn active px-4 py-1.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:border-blue-900 hover:text-blue-900 transition-colors">Toutes</button>
          <button type="button" onclick="tlFilter('presse',event)"   class="filter-btn px-4 py-1.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:border-blue-900 hover:text-blue-900 transition-colors">Presse</button>
          <button type="button" onclick="tlFilter('resultat',event)" class="filter-btn px-4 py-1.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:border-blue-900 hover:text-blue-900 transition-colors">Résultats</button>
          <button type="button" onclick="tlFilter('dossier',event)"  class="filter-btn px-4 py-1.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:border-blue-900 hover:text-blue-900 transition-colors">Dossiers</button>
        </div>
      </div>
    </section>

    <!-- Timeline -->
    <section class="container mx-auto px-4 py-16">
      <div class="tl-wrap">
        <div class="tl-line"></div>
        <div id="tl-list"><p class="text-center py-12 text-slate-400">Chargement…</p></div>
      </div>
    </section>
  </main>

  <custom-footer class="block mt-auto"></custom-footer>

  <script>
  const ARROW = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
  const BADGE_STYLE = {
    resultat: 'color:#b45309;background:#fef3c7',
    dossier:  'color:#475569;background:#f1f5f9',
    presse:   'color:#1d4ed8;background:#eff6ff'
  };
  const BADGE_LABEL = { resultat:'Résultat', dossier:'Dossier', presse:'Presse' };

  function renderCard(a) {
    const img   = a.image ? `<div class="card-banner"><img src="${a.image}" alt="${a.imageAlt||''}" loading="lazy"></div>` : '';
    const jur   = a.juridiction ? ` · ${a.juridiction}` : '';
    const links = (a.liens||[]).map(l =>
      `<a href="${l.url}" target="_blank" rel="noopener" class="pp">
        <div class="pp-thumb" style="background:${l.couleur}"><div class="si">${l.sigle}</div><div class="sl">${l.label}</div></div>
        <div class="pp-body"><span>${l.source}</span><p>${l.titre}</p></div>
        <div class="pp-arrow">${ARROW}</div>
      </a>`).join('');

    return `<div class="tl-card">
      ${img}
      <div style="margin-bottom:.6rem">
        <span style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:.2rem .65rem;border-radius:999px;font-family:'Barlow Condensed',sans-serif;${BADGE_STYLE[a.categorie]}">${BADGE_LABEL[a.categorie]}</span>
      </div>
      <p style="font-size:.7rem;color:#94a3b8;margin-bottom:.35rem">${a.date}${jur}</p>
      <h3 style="font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;text-transform:uppercase;letter-spacing:.02em;color:#1e293b;line-height:1.25;margin-bottom:.6rem">${a.titre}</h3>
      <p class="body">${a.texte}</p>
      ${links}
    </div>`;
  }

  fetch('actualites.json')
    .then(r => r.json())
    .then(data => {
      data.sort((a,b) => b.dateSort.localeCompare(a.dateSort));
      let html = '', curYear = null, idx = 0;
      for (const a of data) {
        const y = a.dateSort.slice(0,4);
        if (y !== curYear) {
          html += `<div class="year-marker"><span>${y}</span></div>`;
          curYear = y; idx = 0;
        }
        const side = idx % 2 === 0 ? 'left' : 'right';
        html += `<div class="tl-row ${side}" data-cat="${a.categorie}"><div class="tl-dot"></div>${renderCard(a)}</div>`;
        idx++;
      }
      document.getElementById('tl-list').innerHTML = html;
    });

  function tlFilter(cat, evt) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    evt?.target?.classList.add('active');
    document.querySelectorAll('.tl-row').forEach(r => {
      r.style.display = (cat === 'all' || r.dataset.cat === cat) ? 'flex' : 'none';
    });
    document.querySelectorAll('.year-marker').forEach(m => {
      let n = m.nextElementSibling, has = false;
      while (n && !n.classList.contains('year-marker')) {
        if (n.classList.contains('tl-row') && n.style.display !== 'none') { has = true; break; }
        n = n.nextElementSibling;
      }
      m.style.display = has ? 'flex' : 'none';
    });
  }
  </script>
</body>
</html>
